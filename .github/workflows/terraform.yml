name: "Terraform CI/CD"

on:
  pull_request:
    branches:
      - main
    paths:
      - 'innovartMart-infra/**'
      - '.github/workflows/**'
  push:
    branches:
      - main
    paths:
      - 'innovartMart-infra/**'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  terraform:
    name: "Terraform Workflow"
    runs-on: ubuntu-latest
    env:
      AWS_REGION: "us-east-1"
    
    defaults:
      run:
        working-directory: ./innovartMart-infra

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Commented out role-to-assume to bypass the bootstrap issue since the role was deleted during terraform destroy
          # role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        if: github.event_name == 'pull_request'
        run: terraform plan -no-color
        continue-on-error: true

      - name: Post Plan to PR Comment
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### Terraform Plan Status: \`${{ steps.plan.outcome }}\` 📖
            
            *Pusher: @${github.actor}, Action: \`${github.event_name}\`*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Terraform Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve

      - name: Deploy Kubernetes Application
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "Waiting 30 seconds for EKS API and IAM permissions to propagate..."
          sleep 30
          echo "Updating kubeconfig..."
          aws eks update-kubeconfig --name project-bedrock-cluster --region us-east-1
          echo "Setting permissions and running deploy.sh..."
          chmod +x ./kubernetes/deploy.sh
          ./kubernetes/deploy.sh
